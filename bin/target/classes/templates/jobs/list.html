<!DOCTYPE html>
<html th:replace="~{base :: layout(~{::main})}">
<body>
    <main>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Available Jobs</h2>
                <th:block sec:authorize="hasRole('EMPLOYER')">
                    <a th:href="@{/jobs/post}" class="btn btn-primary">Post New Job</a>
                </th:block>
            </div>

            <form th:action="@{/jobs}" method="get" style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <input type="text" name="query" th:value="${searchQuery}" class="form-control" placeholder="Search by title, category, or location..." style="flex: 1;">
                <button type="submit" class="btn btn-primary">Search</button>
                <a th:href="@{/jobs}" class="btn btn-secondary" th:if="${searchQuery != null}">Clear</a>
            </form>

            <div class="grid grid-cols-2">
                <div th:each="job : ${jobs}" class="card job-card">
                    <h3 th:text="${job.title}" style="margin-bottom: 0.5rem; color: var(--primary);">Job Title</h3>
                    <div class="meta">
                        <span th:text="${job.category}">Category</span> • 
                        <span th:text="${job.location}">Location</span> •
                        <span th:text="${job.salary != null ? '$' + job.salary : 'Salary DOE'}">Salary</span>
                    </div>
                    <p th:text="${#strings.abbreviate(job.description, 100)}" style="margin-top: 1rem; margin-bottom: 1.5rem;">Description snippet...</p>
                    <div style="margin-top: auto;">
                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-secondary">View Details</a>
                    </div>
                </div>
            </div>
            
            <div th:if="${#lists.isEmpty(jobs)}" style="text-align: center; padding: 4rem 0;">
                <h3 style="color: var(--text-muted);">No jobs found.</h3>
                <p>Check back later or try adjusting your search filters.</p>
            </div>
        </div>
    </main>
</body>
</html>
