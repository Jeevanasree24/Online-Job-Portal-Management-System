<!DOCTYPE html>
<html th:replace="~{base :: layout(~{::main})}">
<body>
    <main>
        <div class="container" style="max-width: 600px; margin-top: 2rem;">
            <div class="card">
                <h2 style="text-align: center; margin-bottom: 2rem;">Create an Account</h2>
                
                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" id="username" th:field="*{username}" class="form-control" required autofocus>
                        <p class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <input type="text" id="name" th:field="*{name}" class="form-control" required>
                        <p class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" required>
                        <p class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control" required>
                        <p class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="role">Account Type</label>
                        <select id="role" th:field="*{role}" class="form-control" required>
                            <option value="" disabled selected>Select an account type</option>
                            <option value="ROLE_STUDENT">Student (Looking for Jobs)</option>
                            <option value="ROLE_EMPLOYER">Employer (Posting Jobs)</option>
                        </select>
                        <p class="error-text" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></p>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                    Already have an account? <a th:href="@{/login}">Log in here</a>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
