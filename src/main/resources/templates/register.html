<!DOCTYPE html>

<html th:replace="~{base :: layout(~{::main}, ~{::scripts})}">
<body>

<main>
    <div class="container" style="max-width: 600px; margin-top: 2rem;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create an Account</h2>

        <form id="registerForm" th:action="@{/register}" th:object="${user}" method="post">

            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>

            <!-- Name -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" required>

                <button type="button" id="sendOtpBtn" onclick="sendOtp()" class="btn btn-secondary" style="margin-top:10px;">
                    Send OTP
                </button>
            </div>

            <!-- OTP -->
            <div class="form-group" id="otpSection" style="display:none;">
                <label>Enter OTP</label>
                <input type="text" id="otp" name="otp" class="form-control">

                <button type="button" onclick="verifyOtp()" class="btn btn-success" style="margin-top:10px;">
                    Verify OTP
                </button>

                <p class="error-text" th:if="${otpError}" th:text="${otpError}"></p>
            </div>

            <p id="otpMessage" style="text-align:center;"></p>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label>Role</label>
                <select th:field="*{role}" class="form-control" required>
                    <option value="" disabled selected>Select</option>
                    <option value="ROLE_STUDENT">Student</option>
                    <option value="ROLE_EMPLOYER">Employer</option>
                </select>
            </div>

            <!-- Register -->
            <button type="submit" id="registerBtn" class="btn btn-primary" style="width:100%;" disabled>
                Register
            </button>
        </form>
    </div>
</div>


</main>

<!-- ✅ SCRIPT -->

<th:block th:fragment="scripts">

<script>

let otpVerified = false;

// ✅ SEND OTP
function sendOtp() {
    const email = document.getElementById("email").value;
    const btn = document.getElementById("sendOtpBtn");

    if (!email) {
        alert("Enter email first");
        return;
    }

    btn.disabled = true;

    fetch('/auth/send-otp', {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + encodeURIComponent(email)
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("otpMessage").innerText = data;
        document.getElementById("otpSection").style.display = "block";
    })
    .catch(err => console.log(err));
}


// ✅ VERIFY OTP
function verifyOtp() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;

    fetch('/auth/verify-otp', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'email=' + encodeURIComponent(email) + '&otp=' + encodeURIComponent(otp)
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("otpMessage").innerText = data;

        if (data.includes("verified")) {
            otpVerified = true;
            document.getElementById("registerBtn").disabled = false;
        }
    });
}


// ✅ BLOCK FORM SUBMIT WITHOUT OTP
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("registerForm").addEventListener("submit", function(e) {
        if (!otpVerified) {
            e.preventDefault();
            alert("Verify OTP first");
        }
    });
});

</script>

</th:block>

</body>
</html>
