<!DOCTYPE html>
<html th:replace="~{base :: layout(~{::main}, ~{::scripts})}">
<body>
    <main>
        <div class="container" style="max-width: 700px; margin-top: 2rem;">
            <div class="card">
                <h2 style="margin-bottom: 0.5rem;">Apply for Job</h2>
                <h3 style="color: var(--primary); margin-bottom: 2rem;" th:text="${job.title}">Job Title</h3>

                <form th:action="@{/applications/apply/{id}(id=${job.id})}" method="post">
                    
                    <div class="alert alert-success" style="background-color: #f8fafc; color: var(--text-main); border: 1px solid var(--border);">
                        <p style="margin: 0; font-weight: 500;">
                            <span th:if="${#authentication.principal.user.resumeFilePath != null}">
                                ✅ Your resume (<span th:text="${#authentication.principal.user.resumeFilePath}">file</span>) will be included.
                            </span>
                            <span th:if="${#authentication.principal.user.resumeFilePath == null}">
                                ⚠️ You have not uploaded a resume yet. <a th:href="@{/profile}">Upload one in your profile first.</a>
                            </span>
                        </p>
                    </div>

                    <div class="form-group" style="margin-top: 2rem;">
                        <label class="form-label" for="coverLetter">Cover Letter / Note to Employer (Optional)</label>
                        <textarea id="coverLetter" name="coverLetter" class="form-control" rows="8" placeholder="Why are you a good fit for this role?"></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary">Submit Application</button>
                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
