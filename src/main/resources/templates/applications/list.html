<!DOCTYPE html>
<html th:replace="~{base :: layout(~{::main}, ~{::scripts})}">
<body>
    <main>
        <div class="container">
            <h2 style="margin-bottom: 2rem;">My Applications</h2>

            <div class="table-container" th:if="${not #lists.isEmpty(applications)}">
                <table>
                    <thead>
                        <tr>
                            <th>Job Title</th>
                            <th>Company</th>
                            <th>Applied On</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app : ${applications}">
                            <td th:text="${app.job.title}">Title</td>
                            <td th:text="${app.job.employer.name}">Company</td>
                            <td th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">Date</td>
                            <td>
                                <span th:class="'badge badge-' + ${#strings.toLowerCase(app.status.name())}" 
                                      th:text="${app.status.name()}">STATUS</span>
                            </td>
                            <td>
                                <a th:href="@{/jobs/{id}(id=${app.job.id})}" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">View Job</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(applications)}" class="card" style="text-align: center; padding: 4rem 2rem;">
                <h3 style="color: var(--text-muted);">You haven't applied to any jobs yet.</h3>
                <p>Start browsing jobs and find your next opportunity!</p>
                <a th:href="@{/jobs}" class="btn btn-primary" style="margin-top: 1rem;">Browse Jobs</a>
            </div>
        </div>
    </main>
</body>
</html>
